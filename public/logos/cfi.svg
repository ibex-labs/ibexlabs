<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-labelledby="cfiTitle">
  <title id="cfiTitle">CFi</title>
  <!-- Approximates CFi brand: deep green field, CF white, lowercase i gold -->
  <rect width="320" height="96" rx="10" fill="#042414"/>
  <text
    x="160"
    y="68"
    text-anchor="middle"
    font-family="Arial Black, Helvetica Neue, Helvetica, Arial, sans-serif"
    font-weight="900"
    font-size="54"
    letter-spacing="-8"
  >
    <tspan fill="#FFFFFF">CF</tspan><tspan fill="#C5A059">i</tspan>
  </text>
</svg>
